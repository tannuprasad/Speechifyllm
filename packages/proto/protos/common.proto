syntax = "proto3";
package chirp.common;

message Timestamp {
  int64 seconds = 1;
  int32 nanos = 2;
}

message PaginationRequest {
  int32 limit = 1;
  int32 offset = 2;
}

message Author {
  string id = 1;
  string username = 2;
  string display_name = 3;
  optional string avatar_url = 4;
}

message Empty {}
